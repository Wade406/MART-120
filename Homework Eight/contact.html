<!DOCTYPE html>
<html>
<head>
    <title>Contact — Wade Pose</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #28211e;
            color: #e8e0d5;
            font-family: Georgia, serif;
        }
        h1 {
            color: #c4855a;
            letter-spacing: 2px;
        }
        label {
            color: #8fbc8f;
        }
      .field-error {
            border: 2px solid red !important;
        }
    </style>  
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="text-center mb-4">Contact Me</h1>

                <form onsubmit="return validateForm()">
                    <div class="mb-3">
                        <label class="form-label">Name:</label>
                        <input type="text" id="name" class="form-control bg-dark text-light border-secondary" name="name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email:</label>
                    <input type="email" id="email" class="form-control bg-dark text-light border-secondary" name="email">   
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="terms" id="terms">
                        <label class="form-check-label" for="terms">I accept the terms of agreement</label>
                    </div>

                    <button type="submit" class="btn w-100" style="background-color: #c4855a; color: #28211e; font-weight: bold;">Submit</button>
                </form>

                <div class="mt-4 d-flex gap-3">
                    <a href="index.html" class="text-info">Home</a>
                    <a href="portfolio.html" class="text-info">Portfolio</a>
                </div>
            </div>
        </div>
    </div>
    <script>
    function validateForm() {
        document.getElementById("name").classList.remove("field-error");
        document.getElementById("email").classList.remove("field-error");
        document.getElementById("terms").classList.remove("field-error");

        var name = document.getElementById("name");
        if (name.value.trim() === "") {
            name.classList.add("field-error");
            name.focus();
            return false;
        }

        var email = document.getElementById("email");
        if (email.value.trim() === "") {
            email.classList.add("field-error");
            email.focus();
            return false;
        }

        var terms = document.getElementById("terms");
        if (!terms.checked) {
            terms.classList.add("field-error");
            terms.focus();
            return false;
        }

        return true;
    }
</script>
</body>
</html>
